name: iOS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Dart Analysis
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Riverpod, Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

  # NOTE: iOS native build requires EdgeVedaCore, a private pod not on
  # public CocoaPods trunk. Native build must be done locally on a Mac
  # with edge_veda installed. CI validates code quality via analyze job.
