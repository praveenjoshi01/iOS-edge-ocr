name: ios_edge_ocr
description: "Offline OCR for iOS using on-device vision-language model inference."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  edge_veda: ^2.5.0
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  freezed_annotation: ^3.1.0
  path_provider: ^2.1.5
  image: ^4.8.0
  go_router: ^15.1.2
  image_picker: ^1.1.2
  camera: ^0.12.0
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  pdf_image_renderer: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5

flutter:
  uses-material-design: true
